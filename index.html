<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Slopad</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; display: grid; place-items: center; background: #0f172a; color: #e2e8f0; }
    .card { padding: 24px 28px; border-radius: 12px; background: #111827; box-shadow: 0 6px 24px rgba(0,0,0,.35); max-width: 640px; width: 90%; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    p { margin: 0 0 12px; line-height: 1.5; color: #cbd5e1; }
    code { background: #0b1020; padding: 2px 6px; border-radius: 6px; color: #93c5fd; }
    .muted { color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Slopad</h1>
    <p>The AI-powered, subscription-first, enterprise-grade text editor nobody asked for.</p>
    <p>Electron app is running. Edit <code>index.html</code> to start building.</p>
    <p class="muted">Security: Node integration disabled. Use preload for safe bridges.</p>
  </div>
</body>
</html>
